name: dotnet_api_boilerplate

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dotnet_api_boilerplate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dotnet_api_boilerplate}
      POSTGRES_DB: ${POSTGRES_DB:-dotnet_api_boilerplate}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dotnet_api_boilerplate} -d ${POSTGRES_DB:-dotnet_api_boilerplate}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ${DOCKER_IMAGE:-dotnet_api_boilerplate/api}:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__Default: ${DATABASE_DEFAULT_CONNECTION:-Host=db;Port=5432;Database=${POSTGRES_DB:-dotnet_api_boilerplate};Username=${POSTGRES_USER:-dotnet_api_boilerplate};Password=${POSTGRES_PASSWORD:-dotnet_api_boilerplate}}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

volumes:
  db-data:
