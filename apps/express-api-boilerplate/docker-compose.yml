services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: express_api
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot job: apply pending Prisma migrations before the API starts. Built
  # from the `builder` stage because the Prisma CLI and schema are absent from
  # the slim production runtime image.
  migrate:
    build:
      context: .
      target: builder
    command: npx prisma migrate deploy
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/express_api?schema=public"

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/express_api?schema=public"
    ports:
      - "3000:3000"

volumes:
  postgres-data:
